<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💌 情书</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: linear-gradient(135deg, #1a0a2e, #2a1040, #1a0a2e);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'STKaiti', 'KaiTi', 'PingFang SC', serif;
    overflow: hidden;
    padding: 20px;
}
canvas { position: fixed; top: 0; left: 0; z-index: 0; }
.letter {
    position: relative;
    z-index: 10;
    background: linear-gradient(135deg, #fff8f0, #fff0e8, #fff5f5);
    border-radius: 20px;
    padding: 40px 36px;
    max-width: 500px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.1);
    transform: rotate(-1deg);
}
.letter::before {
    content: '';
    position: absolute;
    top: 10px; left: 10px; right: 10px; bottom: 10px;
    border: 1px solid rgba(200,150,150,0.2);
    border-radius: 14px;
    pointer-events: none;
}
.letter-header {
    text-align: center;
    margin-bottom: 24px;
}
.letter-header .emoji { font-size: 48px; }
.letter-header h2 {
    font-size: 24px;
    color: #c04060;
    margin-top: 8px;
    font-weight: normal;
    letter-spacing: 6px;
}
.letter-body {
    font-size: 18px;
    color: #4a3030;
    line-height: 2;
    min-height: 200px;
}
.letter-body .line {
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.6s ease;
}
.letter-body .line.show {
    opacity: 1;
    transform: translateY(0);
}
.cursor {
    display: inline-block;
    width: 2px;
    height: 20px;
    background: #c04060;
    margin-left: 2px;
    animation: blink 0.8s infinite;
    vertical-align: middle;
}
@keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
}
.letter-footer {
    text-align: right;
    margin-top: 30px;
    font-size: 16px;
    color: #a06060;
    opacity: 0;
    transition: opacity 1s;
}
.letter-footer.show { opacity: 1; }
.letter-footer .signature {
    font-size: 20px;
    color: #c04060;
    margin-top: 8px;
}
.controls {
    position: relative;
    z-index: 10;
    margin-top: 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
}
.btn {
    padding: 10px 20px;
    border: none;
    border-radius: 25px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
}
.btn-pink {
    background: linear-gradient(135deg, #ff6b9d, #ff4081);
    color: #fff;
}
.btn-pink:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(255,64,129,0.4); }
.btn-outline {
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.8);
    border: 1px solid rgba(255,255,255,0.2);
}
.edit-area {
    position: relative;
    z-index: 10;
    margin-top: 16px;
    width: 100%;
    max-width: 500px;
}
.edit-area textarea {
    width: 100%;
    padding: 14px;
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    background: rgba(0,0,0,0.4);
    color: #fff;
    font-size: 15px;
    font-family: inherit;
    line-height: 1.6;
    resize: vertical;
    min-height: 100px;
    outline: none;
    backdrop-filter: blur(10px);
}
.edit-area textarea:focus { border-color: #ff6b9d; }
.edit-area label {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 6px;
    display: block;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="letter" id="letter">
    <div class="letter-header">
        <div class="emoji">💌</div>
        <h2>给 你 的 信</h2>
    </div>
    <div class="letter-body" id="letterBody"></div>
    <div class="letter-footer" id="letterFooter">
        <div>永远爱你的人</div>
        <div class="signature">❤️</div>
    </div>
</div>

<div class="controls">
    <button class="btn btn-pink" onclick="startTyping()">💌 开始播放</button>
    <button class="btn btn-outline" onclick="resetLetter()">🔄 重新开始</button>
    <button class="btn btn-outline" onclick="toggleEdit()">✏️ 编辑内容</button>
</div>

<div class="edit-area" id="editArea" style="display:none;">
    <label>自定义内容（每行一句）：</label>
    <textarea id="customText">在所有物是人非的景色里
我最喜欢你
想和你一起看日出日落
想和你一起慢慢变老
你是我最美的意外
余生请多指教</textarea>
    <div style="margin-top:8px;">
        <button class="btn btn-pink" onclick="applyCustom()">✨ 应用</button>
    </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, particles = [], typing = false;

function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// 背景花瓣
const petals = Array.from({length: 50}, () => ({
    x: Math.random() * 2000, y: Math.random() * 2000,
    size: Math.random() * 8 + 3,
    speed: Math.random() * 1 + 0.3,
    angle: Math.random() * Math.PI * 2,
    rot: Math.random() * 0.02 - 0.01,
    hue: 340 + Math.random() * 30,
    alpha: Math.random() * 0.3 + 0.1
}));

function drawPetals() {
    petals.forEach(p => {
        p.y += p.speed;
        p.x += Math.sin(p.angle) * 0.5;
        p.angle += 0.01;
        p.y > H + 20 && (p.y = -20, p.x = Math.random() * W);
        ctx.save();
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = `hsl(${p.hue}, 80%, 75%)`;
        ctx.translate(p.x, p.y);
        ctx.rotate(p.angle);
        ctx.beginPath();
        ctx.ellipse(0, 0, p.size, p.size * 0.6, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    });
}

function drawBg() {
    ctx.fillStyle = 'rgba(26, 10, 46, 0.15)';
    ctx.fillRect(0, 0, W, H);
    drawPetals();
}

// 打字机效果
let lines = [
    '在所有物是人非的景色里',
    '我最喜欢你',
    '想和你一起看日出日落',
    '想和你一起慢慢变老',
    '你是我最美的意外',
    '余生请多指教'
];
let currentLine = 0, currentChar = 0;

function typeNext() {
    if (currentLine >= lines.length) {
        document.getElementById('letterFooter').classList.add('show');
        typing = false;
        // 最后爆发爱心
        for (let i = 0; i < 50; i++) {
            particles.push({
                x: W/2 + (Math.random()-0.5)*200,
                y: H/2,
                vx: (Math.random()-0.5)*6,
                vy: -Math.random()*6-2,
                size: Math.random()*15+5,
                life: 1,
                color: `hsl(${340+Math.random()*40}, 100%, 60%)`
            });
        }
        return;
    }

    const body = document.getElementById('letterBody');
    const line = lines[currentLine];

    if (currentChar === 0) {
        const div = document.createElement('div');
        div.className = 'line';
        div.id = `line-${currentLine}`;
        body.appendChild(div);
        setTimeout(() => div.classList.add('show'), 50);
    }

    const el = document.getElementById(`line-${currentLine}`);
    if (currentChar < line.length) {
        el.innerHTML = line.substring(0, currentChar + 1) + '<span class="cursor"></span>';
        currentChar++;
        setTimeout(typeNext, 100 + Math.random() * 100);
    } else {
        el.innerHTML = line;
        currentLine++;
        currentChar = 0;
        setTimeout(typeNext, 500);
    }
}

function startTyping() {
    if (typing) return;
    typing = true;
    currentLine = 0;
    currentChar = 0;
    document.getElementById('letterBody').innerHTML = '';
    document.getElementById('letterFooter').classList.remove('show');
    setTimeout(typeNext, 500);
}

function resetLetter() {
    typing = false;
    currentLine = 0;
    currentChar = 0;
    document.getElementById('letterBody').innerHTML = '';
    document.getElementById('letterFooter').classList.remove('show');
}

function toggleEdit() {
    const el = document.getElementById('editArea');
    el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function applyCustom() {
    const text = document.getElementById('customText').value;
    lines = text.split('\n').filter(l => l.trim());
    resetLetter();
    document.getElementById('editArea').style.display = 'none';
}

// 背景粒子循环
function loop() {
    requestAnimationFrame(loop);
    drawBg();

    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy;
        p.vy += 0.1; p.life -= 0.012;
        ctx.save();
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        const s = p.size * p.life;
        // 画爱心
        ctx.moveTo(p.x, p.y + s*0.3);
        ctx.bezierCurveTo(p.x, p.y, p.x-s, p.y, p.x-s, p.y+s*0.3);
        ctx.bezierCurveTo(p.x-s, p.y+s*0.7, p.x, p.y+s, p.x, p.y+s*1.2);
        ctx.bezierCurveTo(p.x, p.y+s, p.x+s, p.y+s*0.7, p.x+s, p.y+s*0.3);
        ctx.bezierCurveTo(p.x+s, p.y, p.x, p.y, p.x, p.y+s*0.3);
        ctx.fill();
        ctx.restore();
        if (p.life <= 0) particles.splice(i, 1);
    }
}

loop();
setTimeout(startTyping, 1000);
</script>
</body>
</html>
