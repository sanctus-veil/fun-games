<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎵 音乐可视化</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #0a0a1a;
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
}
canvas { display: block; }
.ui {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 20px;
    background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, transparent 100%);
}
.ui h1 {
    font-size: 22px;
    background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff, #a55eea);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}
.btn {
    padding: 8px 20px;
    border: none;
    border-radius: 25px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
}
.btn-upload {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
}
.btn-upload:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(102,126,234,0.4); }
.btn-play {
    background: linear-gradient(135deg, #6bcb77, #2d8a3e);
    color: #fff;
    width: 44px; height: 44px;
    border-radius: 50%;
    font-size: 18px;
    padding: 0;
    display: flex; align-items: center; justify-content: center;
}
.btn-play:hover { transform: scale(1.1); }
.btn-mode {
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.7);
    border: 1px solid rgba(255,255,255,0.2);
}
.btn-mode:hover, .btn-mode.active {
    background: rgba(255,255,255,0.2);
    color: #fff;
}
.file-input { display: none; }
.song-name {
    font-size: 14px;
    color: rgba(255,255,255,0.6);
    max-width: 200px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.controls {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 20px;
    background: linear-gradient(0deg, rgba(0,0,0,0.6) 0%, transparent 100%);
}
.time-bar {
    flex: 1;
    max-width: 400px;
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    cursor: pointer;
    position: relative;
}
.time-progress {
    height: 100%;
    background: linear-gradient(90deg, #667eea, #764ba2);
    border-radius: 3px;
    width: 0;
    transition: width 0.1s;
}
.time-text {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    min-width: 80px;
    text-align: center;
}
.volume-group {
    display: flex;
    align-items: center;
    gap: 6px;
}
.volume-group input[type="range"] {
    width: 80px;
    accent-color: #667eea;
}
.center-hint {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: rgba(255,255,255,0.3);
    font-size: 18px;
    pointer-events: none;
}
.center-hint span {
    font-size: 64px;
    display: block;
    margin-bottom: 16px;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="ui">
    <h1>🎵 音乐可视化</h1>
    <label class="btn btn-upload" for="fileInput">📂 选择音乐</label>
    <input type="file" id="fileInput" class="file-input" accept="audio/*">
    <span class="song-name" id="songName">未选择音乐</span>
    <button class="btn btn-play" id="playBtn" onclick="togglePlay()">▶</button>
    <button class="btn btn-mode active" data-mode="bars" onclick="setVisMode('bars')">📊 频谱</button>
    <button class="btn btn-mode" data-mode="wave" onclick="setVisMode('wave')">🌊 波形</button>
    <button class="btn btn-mode" data-mode="circle" onclick="setVisMode('circle')">⭕ 圆环</button>
    <button class="btn btn-mode" data-mode="particles" onclick="setVisMode('particles')">✨ 粒子</button>
</div>

<div class="center-hint" id="hint">
    <span>🎧</span>
    选择一首音乐开始
</div>

<div class="controls" style="display:none;" id="controls">
    <span class="time-text" id="timeText">0:00 / 0:00</span>
    <div class="time-bar" id="timeBar" onclick="seek(event)">
        <div class="time-progress" id="timeProgress"></div>
    </div>
    <div class="volume-group">
        <span>🔊</span>
        <input type="range" min="0" max="100" value="80" oninput="setVolume(this.value)">
    </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const analyser = audioCtx.createAnalyser();
analyser.fftSize = 256;
const bufferLength = analyser.frequencyBinCount;
const dataArray = new Uint8Array(bufferLength);
const waveArray = new Uint8Array(analyser.fftSize);

let source = null;
let audio = null;
let isPlaying = false;
let visMode = 'bars';
let hue = 0;
let particles = [];
let started = false;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

document.getElementById('fileInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;

    if (audio) {
        audio.pause();
        audio = null;
    }
    if (source) {
        source.disconnect();
        source = null;
    }

    audio = new Audio();
    audio.src = URL.createObjectURL(file);
    audio.crossOrigin = 'anonymous';

    source = audioCtx.createMediaElementSource(audio);
    source.connect(analyser);
    analyser.connect(audioCtx.destination);

    document.getElementById('songName').textContent = file.name.replace(/\.[^.]+$/, '');
    document.getElementById('hint').style.display = 'none';
    document.getElementById('controls').style.display = 'flex';

    audio.volume = 0.8;
    audio.play();
    isPlaying = true;
    document.getElementById('playBtn').textContent = '⏸';
    started = true;

    audio.addEventListener('ended', () => {
        isPlaying = false;
        document.getElementById('playBtn').textContent = '▶';
    });
});

function togglePlay() {
    if (!audio) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    if (isPlaying) {
        audio.pause();
        isPlaying = false;
        document.getElementById('playBtn').textContent = '▶';
    } else {
        audio.play();
        isPlaying = true;
        document.getElementById('playBtn').textContent = '⏸';
    }
}

function setVolume(v) {
    if (audio) audio.volume = v / 100;
}

function seek(e) {
    if (!audio) return;
    const rect = e.target.getBoundingClientRect();
    const ratio = (e.clientX - rect.left) / rect.width;
    audio.currentTime = ratio * audio.duration;
}

function setVisMode(mode) {
    visMode = mode;
    document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active'));
    document.querySelector(`[data-mode="${mode}"]`).classList.add('active');
}

function formatTime(s) {
    if (isNaN(s)) return '0:00';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return m + ':' + (sec < 10 ? '0' : '') + sec;
}

// 星空背景
const bgStars = [];
for (let i = 0; i < 150; i++) {
    bgStars.push({
        x: Math.random() * 2000,
        y: Math.random() * 2000,
        r: Math.random() * 1.5 + 0.2,
        twinkle: Math.random() * Math.PI * 2
    });
}

function drawBg() {
    ctx.fillStyle = 'rgba(10, 10, 26, 0.3)';
    ctx.fillRect(0, 0, W, H);
    bgStars.forEach(s => {
        s.twinkle += 0.015;
        ctx.fillStyle = `rgba(255,255,255,${0.2 + Math.sin(s.twinkle) * 0.2})`;
        ctx.beginPath();
        ctx.arc(s.x % W, s.y % H, s.r, 0, Math.PI * 2);
        ctx.fill();
    });
}

function drawBars() {
    analyser.getByteFrequencyData(dataArray);
    const barW = (W / bufferLength) * 2.5;
    let x = 0;
    for (let i = 0; i < bufferLength; i++) {
        const barH = (dataArray[i] / 255) * H * 0.7;
        const gradient = ctx.createLinearGradient(x, H, x, H - barH);
        gradient.addColorStop(0, `hsl(${hue + i * 2}, 100%, 50%)`);
        gradient.addColorStop(1, `hsl(${hue + i * 2 + 30}, 100%, 70%)`);
        ctx.fillStyle = gradient;
        ctx.fillRect(x, H - barH, barW - 2, barH);
        // 镜像
        ctx.globalAlpha = 0.3;
        ctx.fillRect(x, H - barH + 10, barW - 2, barH * 0.3);
        ctx.globalAlpha = 1;
        x += barW;
    }
}

function drawWave() {
    analyser.getByteTimeDomainData(waveArray);
    ctx.lineWidth = 3;
    ctx.strokeStyle = `hsl(${hue}, 100%, 60%)`;
    ctx.shadowBlur = 15;
    ctx.shadowColor = `hsl(${hue}, 100%, 60%)`;
    ctx.beginPath();
    const sliceW = W / waveArray.length;
    let x = 0;
    for (let i = 0; i < waveArray.length; i++) {
        const v = waveArray[i] / 128.0;
        const y = v * H / 2;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
        x += sliceW;
    }
    ctx.stroke();
    ctx.shadowBlur = 0;

    // 第二层
    ctx.lineWidth = 1.5;
    ctx.strokeStyle = `hsl(${hue + 60}, 100%, 70%)`;
    ctx.globalAlpha = 0.5;
    ctx.beginPath();
    x = 0;
    for (let i = 0; i < waveArray.length; i++) {
        const v = waveArray[i] / 128.0;
        const y = v * H / 2 + 20;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
        x += sliceW;
    }
    ctx.stroke();
    ctx.globalAlpha = 1;
}

function drawCircle() {
    analyser.getByteFrequencyData(dataArray);
    const cx = W / 2, cy = H / 2;
    const baseR = Math.min(W, H) * 0.15;

    // 多层圆环
    for (let layer = 0; layer < 3; layer++) {
        const r = baseR + layer * 40;
        ctx.beginPath();
        for (let i = 0; i <= bufferLength; i++) {
            const idx = i % bufferLength;
            const val = dataArray[idx] / 255;
            const angle = (i / bufferLength) * Math.PI * 2 - Math.PI / 2;
            const radius = r + val * 80 * (1 - layer * 0.2);
            const x = cx + Math.cos(angle) * radius;
            const y = cy + Math.sin(angle) * radius;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.strokeStyle = `hsl(${hue + layer * 40}, 100%, ${60 - layer * 10}%)`;
        ctx.lineWidth = 3 - layer;
        ctx.shadowBlur = 20;
        ctx.shadowColor = `hsl(${hue + layer * 40}, 100%, 60%)`;
        ctx.stroke();
    }
    ctx.shadowBlur = 0;

    // 中心圆
    const avg = dataArray.reduce((a, b) => a + b, 0) / bufferLength / 255;
    const glowR = baseR * 0.6 + avg * 40;
    const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowR);
    gradient.addColorStop(0, `hsla(${hue}, 100%, 70%, 0.8)`);
    gradient.addColorStop(1, `hsla(${hue}, 100%, 50%, 0)`);
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(cx, cy, glowR, 0, Math.PI * 2);
    ctx.fill();
}

function drawParticles() {
    analyser.getByteFrequencyData(dataArray);
    const avg = dataArray.reduce((a, b) => a + b, 0) / bufferLength / 255;

    // 根据频率生成粒子
    if (isPlaying && avg > 0.1) {
        const count = Math.floor(avg * 8) + 1;
        for (let i = 0; i < count; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = avg * 6 + 1;
            particles.push({
                x: W / 2,
                y: H / 2,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                size: Math.random() * 4 + 1,
                color: `hsl(${hue + Math.random() * 60}, 100%, ${50 + Math.random() * 40}%)`,
                life: 80 + Math.random() * 60,
                maxLife: 80 + Math.random() * 60
            });
        }
    }

    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.99;
        p.vy *= 0.99;
        p.life--;

        const alpha = p.life / p.maxLife;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.shadowBlur = p.size * 3;
        ctx.shadowColor = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        if (p.life <= 0) particles.splice(i, 1);
    }
    if (particles.length > 2000) particles.splice(0, particles.length - 2000);
}

function loop() {
    requestAnimationFrame(loop);
    hue = (hue + 0.5) % 360;

    drawBg();

    if (!started) return;

    switch (visMode) {
        case 'bars': drawBars(); break;
        case 'wave': drawWave(); break;
        case 'circle': drawCircle(); break;
        case 'particles': drawParticles(); break;
    }

    // 更新进度条
    if (audio && audio.duration) {
        const pct = (audio.currentTime / audio.duration) * 100;
        document.getElementById('timeProgress').style.width = pct + '%';
        document.getElementById('timeText').textContent =
            formatTime(audio.currentTime) + ' / ' + formatTime(audio.duration);
    }
}

loop();

// 快捷键
document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
    if (e.key === '1') setVisMode('bars');
    if (e.key === '2') setVisMode('wave');
    if (e.key === '3') setVisMode('circle');
    if (e.key === '4') setVisMode('particles');
});
</script>
</body>
</html>
