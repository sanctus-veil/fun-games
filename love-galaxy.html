<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ 星空告白</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #1e1e28;
    overflow: hidden;
    font-family: 'STKaiti', 'KaiTi', 'PingFang SC', 'Georgia', serif;
    min-height: 100vh;
}
canvas { position: fixed; top: 0; left: 0; }
.ui {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
}
.main-text {
    font-size: 40px;
    font-weight: 600;
    letter-spacing: 6px;
    /* 莫兰迪粉灰渐变 */
    background: linear-gradient(135deg, #c9a8a0, #d4c0b5, #bfa8a0, #c4b0a8);
    background-size: 300% 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 5s ease infinite;
    filter: drop-shadow(0 0 20px rgba(196,168,160,0.3));
    opacity: 0;
    transform: scale(0.5);
    transition: all 1.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    text-align: center;
    padding: 0 20px;
}
.main-text.show {
    opacity: 1;
    transform: scale(1);
}
.sub-text {
    font-size: 17px;
    color: rgba(190,175,165,0.6);
    margin-top: 20px;
    letter-spacing: 10px;
    font-weight: 300;
    opacity: 0;
    transition: opacity 2.5s 1.2s;
    text-align: center;
    padding: 0 20px;
}
.sub-text.show { opacity: 1; }
@keyframes shimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
}
.controls {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    pointer-events: all;
}
.btn {
    padding: 10px 22px;
    border: none;
    border-radius: 25px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s;
    backdrop-filter: blur(10px);
    letter-spacing: 1px;
}
/* 莫兰迪灰棕按钮 */
.btn-main {
    background: rgba(168,148,138,0.25);
    color: rgba(210,195,185,0.85);
    border: 1px solid rgba(168,148,138,0.2);
}
.btn-main:hover {
    background: rgba(168,148,138,0.4);
    color: #e0d5cc;
    transform: translateY(-2px);
}
.btn-outline {
    background: rgba(255,255,255,0.04);
    color: rgba(190,175,165,0.6);
    border: 1px solid rgba(255,255,255,0.08);
}
.btn-outline:hover {
    background: rgba(255,255,255,0.08);
    color: rgba(210,195,185,0.8);
}
.msg-input {
    padding: 10px 20px;
    border: 1px solid rgba(168,148,138,0.2);
    border-radius: 25px;
    background: rgba(30,30,40,0.7);
    color: rgba(210,195,185,0.8);
    font-size: 15px;
    width: 200px;
    text-align: center;
    outline: none;
    backdrop-filter: blur(10px);
    letter-spacing: 1px;
    font-family: inherit;
}
.msg-input:focus { border-color: rgba(168,148,138,0.5); }
.msg-input::placeholder { color: rgba(168,148,138,0.3); }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="ui">
    <div class="main-text" id="mainText">余生请多指教 ✨</div>
    <div class="sub-text" id="subText">你是我宇宙中最温柔的光</div>
</div>

<div class="controls">
    <input class="msg-input" id="msgInput" placeholder="输入你想说的话" value="余生请多指教">
    <button class="btn btn-main" onclick="showText()">✦ 显示</button>
    <button class="btn btn-main" onclick="explodeHeart()">✦ 爆发</button>
    <button class="btn btn-outline" onclick="toggleBeat()">♡ 心跳</button>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, particles = [], heartParticles = [], beatMode = true, beatScale = 1, beatDir = 1;
let frame = 0;

function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// 莫兰迪配色
const MORANDI = {
    // 心形粒子色（灰粉、灰紫、灰棕）
    heart: [
        {h:10, s:25, l:68},  // 灰粉
        {h:20, s:20, l:65},  // 灰棕
        {h:350, s:18, l:66}, // 灰玫瑰
        {h:30, s:22, l:70},  // 暖灰
        {h:280, s:12, l:68}, // 灰紫
    ],
    // 星云色（灰蓝、灰绿、灰紫）
    nebula: [
        {h:210, s:15, l:45}, // 灰蓝
        {h:150, s:12, l:42}, // 灰绿
        {h:270, s:10, l:45}, // 灰紫
        {h:30, s:15, l:48},  // 灰棕
    ],
    // 背景
    bgInner: 'rgba(35, 32, 42, 0.12)',
    bgOuter: 'rgba(22, 22, 30, 0.12)',
    // 星星
    star: 'rgba(200, 195, 190, ',
};

function randMorandi(arr) {
    const c = arr[Math.floor(Math.random() * arr.length)];
    return {h: c.h + (Math.random()-0.5)*10, s: c.s + (Math.random()-0.5)*5, l: c.l + (Math.random()-0.5)*8};
}

// 心形参数方程
function heartPoint(t, scale) {
    const x = 16 * Math.pow(Math.sin(t), 3);
    const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
    return { x: x * scale, y: y * scale };
}

// 创建心形粒子
function createHeart() {
    heartParticles = [];
    const scale = Math.min(W, H) * 0.013;
    const cx = W / 2, cy = H / 2 - 30;
    const count = 300;

    for (let i = 0; i < count; i++) {
        const t = (i / count) * Math.PI * 2;
        const p = heartPoint(t, scale);
        const spread = Math.random() * scale * 0.8;
        const angle = Math.random() * Math.PI * 2;
        const mc = randMorandi(MORANDI.heart);
        heartParticles.push({
            baseX: cx + p.x + Math.cos(angle) * spread * 0.3,
            baseY: cy + p.y + Math.sin(angle) * spread * 0.3,
            x: cx + p.x, y: cy + p.y,
            size: Math.random() * 2.5 + 0.8,
            speed: Math.random() * 0.015 + 0.008,
            angle: Math.random() * Math.PI * 2,
            h: mc.h, s: mc.s, l: mc.l,
            alpha: Math.random() * 0.4 + 0.4,
            orbit: Math.random() * 4 + 2
        });
    }
}

// 星空背景
const stars = Array.from({length: 250}, () => ({
    x: Math.random() * 3000, y: Math.random() * 3000,
    r: Math.random() * 1.5 + 0.3,
    twinkle: Math.random() * 6.28,
    speed: Math.random() * 0.3 + 0.05
}));

const nebulae = Array.from({length: 4}, () => {
    const c = MORANDI.nebula[Math.floor(Math.random() * MORANDI.nebula.length)];
    return {
        x: Math.random() * 2000, y: Math.random() * 2000,
        r: Math.random() * 250 + 120,
        h: c.h, s: c.s, l: c.l,
        alpha: Math.random() * 0.04 + 0.015
    };
});

function drawBg() {
    const gradient = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)*0.7);
    gradient.addColorStop(0, MORANDI.bgInner);
    gradient.addColorStop(1, MORANDI.bgOuter);
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, W, H);

    // 星云
    nebulae.forEach(n => {
        const g = ctx.createRadialGradient(n.x%W, n.y%H, 0, n.x%W, n.y%H, n.r);
        g.addColorStop(0, `hsla(${n.h}, ${n.s}%, ${n.l}%, ${n.alpha})`);
        g.addColorStop(1, 'transparent');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(n.x%W, n.y%H, n.r, 0, Math.PI*2);
        ctx.fill();
    });

    // 星星
    stars.forEach(s => {
        s.twinkle += 0.015;
        s.x += s.speed;
        if (s.x > W+10) s.x = -10;
        const alpha = 0.15 + Math.sin(s.twinkle) * 0.15;
        ctx.fillStyle = MORANDI.star + alpha + ')';
        ctx.beginPath();
        ctx.arc(s.x, s.y%H, s.r, 0, Math.PI*2);
        ctx.fill();
    });
}

// 绘制心形
function drawHeart() {
    if (beatMode) {
        beatScale += beatDir * 0.002;
        if (beatScale > 1.06) beatDir = -1;
        if (beatScale < 0.96) beatDir = 1;
    }

    const cx = W/2, cy = H/2 - 30;

    heartParticles.forEach(p => {
        p.angle += p.speed;
        const ox = Math.cos(p.angle) * p.orbit;
        const oy = Math.sin(p.angle) * p.orbit;
        let x = p.baseX + ox, y = p.baseY + oy;
        if (beatMode) {
            x = cx + (x - cx) * beatScale;
            y = cy + (y - cy) * beatScale;
        }
        p.x = x; p.y = y;

        ctx.save();
        ctx.globalAlpha = p.alpha * (0.6 + Math.sin(p.angle*2)*0.2);
        ctx.fillStyle = `hsl(${p.h}, ${p.s}%, ${p.l}%)`;
        ctx.shadowBlur = 8;
        ctx.shadowColor = `hsla(${p.h}, ${p.s}%, ${p.l-10}%, 0.4)`;
        ctx.beginPath();
        ctx.arc(x, y, p.size, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
    });

    // 心形轮廓
    ctx.save();
    ctx.globalAlpha = 0.1 + Math.sin(frame*0.025)*0.06;
    ctx.strokeStyle = `hsla(15, 20%, 65%, 0.5)`;
    ctx.lineWidth = 1;
    ctx.shadowBlur = 20;
    ctx.shadowColor = `hsla(15, 20%, 60%, 0.3)`;
    ctx.beginPath();
    const scale = Math.min(W,H)*0.013*(beatMode ? beatScale : 1);
    for (let t = 0; t <= Math.PI*2; t += 0.05) {
        const p = heartPoint(t, scale);
        t === 0 ? ctx.moveTo(cx+p.x, cy+p.y) : ctx.lineTo(cx+p.x, cy+p.y);
    }
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
}

// 漂浮粒子
function drawFloatingParticles() {
    for (let i = particles.length-1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy;
        p.vy -= 0.015;
        p.life -= p.decay;
        ctx.save();
        ctx.globalAlpha = p.life * 0.7;
        ctx.fillStyle = p.color;
        ctx.shadowBlur = 6;
        ctx.shadowColor = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size*p.life, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
        if (p.life <= 0) particles.splice(i, 1);
    }
}

function showText() {
    const msg = document.getElementById('msgInput').value || '余生请多指教';
    document.getElementById('mainText').textContent = msg + ' ✨';
    document.getElementById('mainText').classList.add('show');
    document.getElementById('subText').classList.add('show');

    for (let i = 0; i < 80; i++) {
        const angle = Math.random()*Math.PI*2;
        const speed = Math.random()*3+0.8;
        const mc = randMorandi(MORANDI.heart);
        particles.push({
            x: W/2, y: H/2,
            vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed-1.5,
            size: Math.random()*3+1, life: 1, decay: 0.007,
            color: `hsl(${mc.h}, ${mc.s}%, ${mc.l}%)`
        });
    }
}

function explodeHeart() {
    heartParticles.forEach(p => {
        const angle = Math.random()*Math.PI*2;
        const speed = Math.random()*6+2;
        particles.push({
            x: p.x, y: p.y,
            vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed,
            size: p.size*2, life: 1, decay: 0.007,
            color: `hsl(${p.h}, ${p.s}%, ${p.l}%)`
        });
    });
    setTimeout(() => { particles = []; createHeart(); }, 2500);
}

function toggleBeat() { beatMode = !beatMode; }

canvas.addEventListener('click', (e) => {
    for (let i = 0; i < 25; i++) {
        const angle = Math.random()*Math.PI*2;
        const speed = Math.random()*2.5+0.8;
        const mc = randMorandi(MORANDI.heart);
        particles.push({
            x: e.clientX, y: e.clientY,
            vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed,
            size: Math.random()*2.5+0.8, life: 1, decay: 0.01,
            color: `hsl(${mc.h}, ${mc.s}%, ${mc.l}%)`
        });
    }
});

createHeart();

function loop() {
    requestAnimationFrame(loop);
    frame++;
    drawBg();
    drawHeart();
    drawFloatingParticles();
    if (particles.length > 1200) particles.splice(0, 400);
}

loop();
setTimeout(showText, 2500);
</script>
</body>
</html>
