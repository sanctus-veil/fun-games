<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 星空告白</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #0a0b1a;
    overflow: hidden;
    font-family: 'PingFang SC', 'Microsoft YaHei', 'STKaiti', 'KaiTi', serif;
    min-height: 100vh;
}
canvas { position: fixed; top: 0; left: 0; }
.ui {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
}
.main-text {
    font-size: 42px;
    font-weight: 700;
    letter-spacing: 4px;
    background: linear-gradient(135deg, #d4a574, #f0d9b5, #c9a96e, #f5e6cc);
    background-size: 300% 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 4s ease infinite;
    filter: drop-shadow(0 0 25px rgba(212,165,116,0.5));
    opacity: 0;
    transform: scale(0.5);
    transition: all 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    text-align: center;
    padding: 0 20px;
}
.main-text.show {
    opacity: 1;
    transform: scale(1);
}
.sub-text {
    font-size: 18px;
    color: rgba(212,165,116,0.7);
    margin-top: 20px;
    letter-spacing: 8px;
    font-weight: 300;
    opacity: 0;
    transition: opacity 2s 1s;
    text-align: center;
    padding: 0 20px;
}
.sub-text.show { opacity: 1; }
@keyframes shimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
}
.controls {
    position: fixed;
    bottom: 20px; left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    pointer-events: all;
}
.btn {
    padding: 10px 20px;
    border: none;
    border-radius: 25px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    backdrop-filter: blur(10px);
}
.btn-pink {
    background: linear-gradient(135deg, rgba(212,165,116,0.7), rgba(180,130,80,0.7));
    color: #fff;
    border: 1px solid rgba(212,165,116,0.3);
}
.btn-pink:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(212,165,116,0.4); }
.btn-outline {
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.8);
    border: 1px solid rgba(255,255,255,0.2);
}
.msg-input {
    padding: 10px 20px;
    border: 2px solid rgba(212,165,116,0.3);
    border-radius: 25px;
    background: rgba(0,0,0,0.5);
    color: #fff;
    font-size: 15px;
    width: 200px;
    text-align: center;
    outline: none;
    backdrop-filter: blur(10px);
}
.msg-input:focus { border-color: #d4a574; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="ui">
    <div class="main-text" id="mainText">我喜欢你 ❤️</div>
    <div class="sub-text" id="subText">你是我宇宙中最亮的星</div>
</div>

<div class="controls">
    <input class="msg-input" id="msgInput" placeholder="输入你想说的话" value="余生请多指教"
    <button class="btn btn-pink" onclick="showText()">💖 显示</button>
    <button class="btn btn-pink" onclick="explodeHeart()">💥 爆发</button>
    <button class="btn btn-outline" onclick="toggleBeat()">💓 心跳</button>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, particles = [], heartParticles = [], beatMode = true, beatScale = 1, beatDir = 1;
let hue = 0, frame = 0;

function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// 3D心形参数方程
function heartPoint(t, scale) {
    const x = 16 * Math.pow(Math.sin(t), 3);
    const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
    return { x: x * scale, y: y * scale };
}

// 创建心形粒子
function createHeart() {
    heartParticles = [];
    const scale = Math.min(W, H) * 0.013;
    const cx = W / 2, cy = H / 2 - 30;
    const count = 300;

    for (let i = 0; i < count; i++) {
        const t = (i / count) * Math.PI * 2;
        const p = heartPoint(t, scale);
        // 添加随机偏移使心形更饱满
        const spread = Math.random() * scale * 0.8;
        const angle = Math.random() * Math.PI * 2;
        heartParticles.push({
            baseX: cx + p.x + Math.cos(angle) * spread * 0.3,
            baseY: cy + p.y + Math.sin(angle) * spread * 0.3,
            x: cx + p.x,
            y: cy + p.y,
            size: Math.random() * 3 + 1,
            speed: Math.random() * 0.02 + 0.01,
            angle: Math.random() * Math.PI * 2,
            hue: 25 + Math.random() * 20,
            alpha: Math.random() * 0.5 + 0.5,
            orbit: Math.random() * 5 + 2
        });
    }
}

// 星空背景粒子
const stars = Array.from({length: 300}, () => ({
    x: Math.random() * 3000,
    y: Math.random() * 3000,
    r: Math.random() * 2 + 0.3,
    twinkle: Math.random() * 6.28,
    speed: Math.random() * 0.5 + 0.1
}));

// 星云
const nebulae = Array.from({length: 5}, () => ({
    x: Math.random() * 2000,
    y: Math.random() * 2000,
    r: Math.random() * 200 + 100,
    hue: Math.random() * 60 + 320,
    alpha: Math.random() * 0.05 + 0.02
}));

function drawBg() {
    // 深色背景带渐变
    const gradient = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)*0.7);
    gradient.addColorStop(0, 'rgba(30, 10, 40, 0.15)');
    gradient.addColorStop(1, 'rgba(5, 5, 15, 0.15)');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, W, H);

    // 星云
    nebulae.forEach(n => {
        const gradient = ctx.createRadialGradient(n.x % W, n.y % H, 0, n.x % W, n.y % H, n.r);
        gradient.addColorStop(0, `hsla(${n.hue}, 80%, 50%, ${n.alpha})`);
        gradient.addColorStop(1, 'transparent');
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(n.x % W, n.y % H, n.r, 0, Math.PI * 2);
        ctx.fill();
    });

    // 星星
    stars.forEach(s => {
        s.twinkle += 0.02;
        s.x += s.speed;
        if (s.x > W + 10) s.x = -10;
        const alpha = 0.3 + Math.sin(s.twinkle) * 0.3;
        ctx.fillStyle = `rgba(255,255,255,${alpha})`;
        ctx.beginPath();
        ctx.arc(s.x, s.y % H, s.r, 0, Math.PI * 2);
        ctx.fill();
    });
}

// 绘制心形粒子
function drawHeart() {
    if (beatMode) {
        beatScale += beatDir * 0.003;
        if (beatScale > 1.08) beatDir = -1;
        if (beatScale < 0.95) beatDir = 1;
    }

    const cx = W / 2, cy = H / 2 - 30;

    heartParticles.forEach(p => {
        p.angle += p.speed;
        const ox = Math.cos(p.angle) * p.orbit;
        const oy = Math.sin(p.angle) * p.orbit;

        let x = p.baseX + ox;
        let y = p.baseY + oy;

        // 心跳缩放
        if (beatMode) {
            x = cx + (x - cx) * beatScale;
            y = cy + (y - cy) * beatScale;
        }

        p.x = x;
        p.y = y;

        // 发光效果
        ctx.save();
        ctx.globalAlpha = p.alpha * (0.7 + Math.sin(p.angle * 2) * 0.3);
        ctx.fillStyle = `hsl(${30 + Math.sin(p.angle) * 10}, ${60 + Math.sin(frame*0.008)*20}%, ${65 + Math.sin(p.angle*2)*10}%)`;
        ctx.shadowBlur = 12;
        ctx.shadowColor = `hsl(35, 70%, 55%)`;
        ctx.beginPath();
        ctx.arc(x, y, p.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    });

    // 心形轮廓发光
    ctx.save();
    ctx.globalAlpha = 0.15 + Math.sin(frame * 0.03) * 0.1;
    ctx.strokeStyle = `hsl(30, ${60 + Math.sin(frame*0.01)*20}%, 60%)`;
    ctx.lineWidth = 1.5;
    ctx.shadowBlur = 25;
    ctx.shadowColor = `hsl(35, 70%, 50%)`;
    ctx.beginPath();
    const scale = Math.min(W, H) * 0.013 * (beatMode ? beatScale : 1);
    for (let t = 0; t <= Math.PI * 2; t += 0.05) {
        const p = heartPoint(t, scale);
        const px = cx + p.x;
        const py = cy + p.y;
        t === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
}

// 漂浮粒子
function drawFloatingParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy;
        p.vy -= 0.02; // 向上飘
        p.life -= p.decay;
        ctx.save();
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.shadowBlur = 8;
        ctx.shadowColor = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        if (p.life <= 0) particles.splice(i, 1);
    }
}

// 文字显示
function showText() {
    const msg = document.getElementById('msgInput').value || '我喜欢你';
    document.getElementById('mainText').textContent = msg + ' ✨';
    document.getElementById('mainText').classList.add('show');
    document.getElementById('subText').textContent = '你是我宇宙中最温柔的光';
    document.getElementById('subText').classList.add('show');

    // 爆发粒子
    for (let i = 0; i < 100; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 4 + 1;
        particles.push({
            x: W/2, y: H/2,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - 2,
            size: Math.random() * 4 + 1,
            life: 1,
            decay: 0.008,
            color: `hsl(${25 + Math.random() * 20}, ${60 + Math.random()*30}%, ${55 + Math.random() * 30}%)`
        });
    }
}

// 爆发效果
function explodeHeart() {
    heartParticles.forEach(p => {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 8 + 3;
        particles.push({
            x: p.x, y: p.y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            size: p.size * 2,
            life: 1,
            decay: 0.008,
            color: `hsl(30, 70%, 60%)`
        });
    });

    // 重新生成心形
    setTimeout(() => {
        particles = [];
        createHeart();
    }, 2000);
}

function toggleBeat() {
    beatMode = !beatMode;
}

canvas.addEventListener('click', (e) => {
    for (let i = 0; i < 30; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 3 + 1;
        particles.push({
            x: e.clientX, y: e.clientY,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            size: Math.random() * 3 + 1,
            life: 1,
            decay: 0.012,
            color: `hsl(${25 + Math.random() * 20}, ${60 + Math.random()*20}%, 60%)`
        });
    }
});

createHeart();

function loop() {
    requestAnimationFrame(loop);
    frame++;
    hue = (hue + 0.3) % 360;

    drawBg();
    drawHeart();
    drawFloatingParticles();

    // 限制粒子数
    if (particles.length > 1500) particles.splice(0, 500);
}

loop();

// 自动显示文字
setTimeout(showText, 2000);
</script>
</body>
</html>
