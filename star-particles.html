<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌌 星空粒子特效</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #0a0a1a;
    overflow: hidden;
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    cursor: crosshair;
}
canvas { display: block; }
.ui {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 10px;
}
.ui h1 {
    font-size: 20px;
    background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 4px;
}
.ui .hint {
    font-size: 12px;
    color: rgba(255,255,255,0.4);
}
.mode-btns {
    display: flex;
    gap: 6px;
}
.mode-btn {
    padding: 6px 14px;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.7);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.3s;
}
.mode-btn:hover { background: rgba(255,255,255,0.1); }
.mode-btn.active {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
    border-color: transparent;
}
.slider-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
}
.slider-group label {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
}
input[type="range"] {
    width: 150px;
    accent-color: #667eea;
}
.stats {
    position: fixed;
    top: 20px;
    right: 20px;
    font-size: 12px;
    color: rgba(255,255,255,0.3);
    text-align: right;
}
</style>
</head>
<body>

<div class="ui">
    <h1>🌌 星空粒子</h1>
    <p class="hint">移动鼠标创造粒子 · 点击放烟花</p>
    <div class="mode-btns">
        <button class="mode-btn active" onclick="setMode('trail')">✨ 拖尾</button>
        <button class="mode-btn" onclick="setMode('firework')">🎆 烟花</button>
        <button class="mode-btn" onclick="setMode('galaxy')">🌀 星系</button>
        <button class="mode-btn" onclick="setMode('rain')">🌧️ 星雨</button>
    </div>
    <div class="slider-group">
        <label>粒子数量: <span id="countVal">3</span></label>
        <input type="range" min="1" max="10" value="3" oninput="emitCount=this.value;document.getElementById('countVal').textContent=this.value">
    </div>
    <div class="slider-group">
        <label>粒子大小: <span id="sizeVal">4</span></label>
        <input type="range" min="1" max="12" value="4" oninput="maxSize=this.value;document.getElementById('sizeVal').textContent=this.value">
    </div>
</div>

<div class="stats" id="stats"></div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;
let particles = [];
let mode = 'trail';
let emitCount = 3;
let maxSize = 4;
let mouseX = 0, mouseY = 0;
let hue = 0;

function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

class Particle {
    constructor(x, y, vx, vy, size, color, life) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.size = size;
        this.color = color;
        this.life = life;
        this.maxLife = life;
        this.gravity = 0;
        this.friction = 0.99;
    }
    update() {
        this.vx *= this.friction;
        this.vy *= this.friction;
        this.vy += this.gravity;
        this.x += this.vx;
        this.y += this.vy;
        this.life--;
    }
    draw() {
        const alpha = this.life / this.maxLife;
        const s = this.size * alpha;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = this.color;
        ctx.shadowBlur = s * 3;
        ctx.shadowColor = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, s, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}

function randColor() {
    return `hsl(${hue + Math.random() * 60 - 30}, 100%, ${60 + Math.random() * 30}%)`;
}

function emit(x, y) {
    for (let i = 0; i < emitCount; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 2 + 0.5;
        const p = new Particle(
            x, y,
            Math.cos(angle) * speed,
            Math.sin(angle) * speed,
            Math.random() * maxSize + 1,
            randColor(),
            60 + Math.random() * 60
        );
        particles.push(p);
    }
}

function createFirework(x, y) {
    const count = 80 + Math.random() * 60;
    const baseHue = hue;
    for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 / count) * i + Math.random() * 0.3;
        const speed = Math.random() * 6 + 2;
        const p = new Particle(
            x, y,
            Math.cos(angle) * speed,
            Math.sin(angle) * speed,
            Math.random() * 3 + 1,
            `hsl(${baseHue + Math.random() * 40 - 20}, 100%, ${50 + Math.random() * 40}%)`,
            50 + Math.random() * 50
        );
        p.gravity = 0.05;
        p.friction = 0.97;
        particles.push(p);
    }
    // 核心闪光
    for (let i = 0; i < 10; i++) {
        const p = new Particle(x, y, (Math.random()-0.5)*2, (Math.random()-0.5)*2, 8, '#fff', 15);
        particles.push(p);
    }
}

function galaxyEmit(x, y) {
    for (let i = 0; i < 2; i++) {
        const angle = Math.random() * Math.PI * 2;
        const dist = Math.random() * 5;
        const speed = 1.5 + Math.random();
        const p = new Particle(
            x + Math.cos(angle) * dist,
            y + Math.sin(angle) * dist,
            Math.cos(angle + Math.PI/2) * speed,
            Math.sin(angle + Math.PI/2) * speed,
            Math.random() * 2 + 0.5,
            `hsl(${hue + Math.random() * 80}, 80%, ${50 + Math.random() * 40}%)`,
            80 + Math.random() * 80
        );
        p.friction = 0.995;
        particles.push(p);
    }
}

function rainEmit() {
    for (let i = 0; i < 3; i++) {
        const x = Math.random() * W;
        const p = new Particle(
            x, -10,
            (Math.random() - 0.5) * 0.5,
            Math.random() * 4 + 2,
            Math.random() * 2 + 0.5,
            `hsl(${200 + Math.random() * 60}, 80%, ${60 + Math.random() * 30}%)`,
            100 + Math.random() * 80
        );
        particles.push(p);
    }
}

function setMode(m) {
    mode = m;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
}

canvas.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
    if (mode === 'trail') emit(mouseX, mouseY);
    else if (mode === 'galaxy') galaxyEmit(mouseX, mouseY);
});

canvas.addEventListener('click', (e) => {
    if (mode === 'firework') createFirework(e.clientX, e.clientY);
    else createFirework(e.clientX, e.clientY);
});

canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const t = e.touches[0];
    mouseX = t.clientX;
    mouseY = t.clientY;
    if (mode === 'trail') emit(mouseX, mouseY);
    else if (mode === 'galaxy') galaxyEmit(mouseX, mouseY);
}, { passive: false });

canvas.addEventListener('touchstart', (e) => {
    const t = e.touches[0];
    createFirework(t.clientX, t.clientY);
});

// 星空背景
const stars = [];
for (let i = 0; i < 200; i++) {
    stars.push({
        x: Math.random() * 2000,
        y: Math.random() * 2000,
        r: Math.random() * 1.5 + 0.3,
        twinkle: Math.random() * Math.PI * 2
    });
}

function drawStars() {
    stars.forEach(s => {
        s.twinkle += 0.02;
        const alpha = 0.3 + Math.sin(s.twinkle) * 0.3;
        ctx.fillStyle = `rgba(255,255,255,${alpha})`;
        ctx.beginPath();
        ctx.arc(s.x % W, s.y % H, s.r, 0, Math.PI * 2);
        ctx.fill();
    });
}

let lastTime = 0;
function loop(time) {
    requestAnimationFrame(loop);
    hue = (hue + 0.5) % 360;

    // 半透明覆盖产生拖尾效果
    ctx.fillStyle = 'rgba(10, 10, 26, 0.15)';
    ctx.fillRect(0, 0, W, H);

    drawStars();

    if (mode === 'rain') rainEmit();

    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].draw();
        if (particles[i].life <= 0) particles.splice(i, 1);
    }

    // 限制粒子数量
    if (particles.length > 3000) particles.splice(0, particles.length - 3000);

    // 统计
    document.getElementById('stats').textContent = `粒子: ${particles.length}`;
}

requestAnimationFrame(loop);
</script>
</body>
</html>
