<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💕 满屏爱心</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    overflow: hidden;
    background: #0a0a1a;
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    min-height: 100vh;
    cursor: pointer;
}
canvas { position: fixed; top: 0; left: 0; z-index: 1; }
.ui {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
}
.msg-input {
    padding: 12px 24px;
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 30px;
    background: rgba(0,0,0,0.5);
    color: #fff;
    font-size: 16px;
    width: 300px;
    text-align: center;
    outline: none;
    backdrop-filter: blur(10px);
}
.msg-input:focus { border-color: #ff6b9d; }
.btn-row { display: flex; gap: 10px; }
.btn {
    padding: 10px 24px;
    border: none;
    border-radius: 25px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
}
.btn-love {
    background: linear-gradient(135deg, #ff6b9d, #ff4081);
    color: #fff;
    box-shadow: 0 4px 20px rgba(255,64,129,0.4);
}
.btn-love:hover { transform: scale(1.05); box-shadow: 0 6px 25px rgba(255,64,129,0.5); }
.btn-mode {
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.8);
    border: 1px solid rgba(255,255,255,0.2);
}
.btn-mode:hover, .btn-mode.active {
    background: rgba(255,255,255,0.2);
    color: #fff;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="ui">
    <div class="btn-row">
        <button class="btn btn-mode active" onclick="setMode('hearts')">💕 爱心</button>
        <button class="btn btn-mode" onclick="setMode('stars')">⭐ 星星</button>
        <button class="btn btn-mode" onclick="setMode('snow')">❄️ 雪花</button>
        <button class="btn btn-mode" onclick="setMode('fireworks')">🎆 烟花</button>
    </div>
    <input class="msg-input" id="msgInput" placeholder="输入你想说的话..." value="我喜欢你 ❤️">
    <button class="btn btn-love" onclick="burst()">💖 发射！</button>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, mode = 'hearts', particles = [], texts = [], hue = 0;

function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// 爱心路径
function drawHeart(x, y, size, color, alpha) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = color;
    ctx.beginPath();
    const s = size;
    ctx.moveTo(x, y + s * 0.3);
    ctx.bezierCurveTo(x, y, x - s, y, x - s, y + s * 0.3);
    ctx.bezierCurveTo(x - s, y + s * 0.7, x, y + s, x, y + s * 1.2);
    ctx.bezierCurveTo(x, y + s, x + s, y + s * 0.7, x + s, y + s * 0.3);
    ctx.bezierCurveTo(x + s, y, x, y, x, y + s * 0.3);
    ctx.fill();
    ctx.restore();
}

class Particle {
    constructor(x, y, type) {
        this.x = x; this.y = y;
        this.type = type;
        this.vx = (Math.random() - 0.5) * 8;
        this.vy = -Math.random() * 8 - 4;
        this.size = Math.random() * 20 + 10;
        this.life = 1;
        this.decay = Math.random() * 0.01 + 0.005;
        this.rotation = Math.random() * Math.PI * 2;
        this.rotSpeed = (Math.random() - 0.5) * 0.1;
        this.color = `hsl(${340 + Math.random() * 40}, 100%, ${55 + Math.random() * 20}%)`;
        if (type === 'stars') {
            this.color = `hsl(${40 + Math.random() * 20}, 100%, ${60 + Math.random() * 30}%)`;
            this.size = Math.random() * 8 + 4;
        } else if (type === 'snow') {
            this.color = `hsl(200, 20%, ${80 + Math.random() * 20}%)`;
            this.size = Math.random() * 6 + 2;
            this.vy = Math.random() * 2 + 1;
            this.vx = (Math.random() - 0.5) * 2;
            this.decay = 0.003;
        } else if (type === 'fireworks') {
            this.color = `hsl(${Math.random() * 360}, 100%, 60%)`;
            this.size = Math.random() * 4 + 2;
            this.decay = 0.015;
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * 6 + 2;
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed;
        }
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        if (this.type !== 'snow') this.vy += 0.15;
        this.vx *= 0.99;
        this.vy *= 0.99;
        this.life -= this.decay;
        this.rotation += this.rotSpeed;
    }
    draw() {
        if (this.type === 'hearts') {
            drawHeart(this.x, this.y, this.size * this.life, this.color, this.life);
        } else if (this.type === 'stars') {
            drawStar(this.x, this.y, this.size * this.life, 5, this.color, this.life);
        } else if (this.type === 'snow') {
            ctx.save();
            ctx.globalAlpha = this.life;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        } else {
            ctx.save();
            ctx.globalAlpha = this.life;
            ctx.fillStyle = this.color;
            ctx.shadowBlur = 10;
            ctx.shadowColor = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }
}

function drawStar(x, y, r, points, color, alpha) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = color;
    ctx.beginPath();
    for (let i = 0; i < points * 2; i++) {
        const angle = (i * Math.PI) / points - Math.PI / 2;
        const radius = i % 2 === 0 ? r : r * 0.4;
        const px = x + Math.cos(angle) * radius;
        const py = y + Math.sin(angle) * radius;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();
    ctx.restore();
}

class FloatingText {
    constructor(text, x, y) {
        this.text = text;
        this.x = x; this.y = y;
        this.vy = -1.5;
        this.life = 1;
        this.size = 28 + Math.random() * 12;
        this.hue = 340 + Math.random() * 40;
    }
    update() { this.y += this.vy; this.life -= 0.008; }
    draw() {
        ctx.save();
        ctx.globalAlpha = this.life;
        ctx.font = `bold ${this.size}px 'PingFang SC', sans-serif`;
        ctx.textAlign = 'center';
        ctx.fillStyle = `hsl(${this.hue}, 100%, 65%)`;
        ctx.shadowBlur = 15;
        ctx.shadowColor = `hsl(${this.hue}, 100%, 50%)`;
        ctx.fillText(this.text, this.x, this.y);
        ctx.restore();
    }
}

function burst() {
    const msg = document.getElementById('msgInput').value || '❤️';
    const cx = W / 2, cy = H / 2;

    // 大量粒子
    for (let i = 0; i < 80; i++) {
        particles.push(new Particle(cx + (Math.random()-0.5)*100, cy + (Math.random()-0.5)*100, mode));
    }

    // 浮动文字
    for (let i = 0; i < 5; i++) {
        setTimeout(() => {
            texts.push(new FloatingText(msg, cx + (Math.random()-0.5)*200, cy + (Math.random()-0.5)*100));
        }, i * 200);
    }
}

// 自动持续发射
let autoTimer = null;
function autoBurst() {
    const msgs = ['❤️', '💕', '💖', '💗', '💘', '✨', '🌟'];
    const msg = document.getElementById('msgInput').value || msgs[Math.floor(Math.random() * msgs.length)];
    const x = Math.random() * W;
    const y = H * 0.8;
    for (let i = 0; i < 15; i++) {
        particles.push(new Particle(x + (Math.random()-0.5)*60, y, mode));
    }
    if (Math.random() > 0.6) {
        texts.push(new FloatingText(msg, x, y - 50));
    }
}

canvas.addEventListener('click', (e) => {
    for (let i = 0; i < 30; i++) {
        particles.push(new Particle(e.clientX, e.clientY, mode));
    }
    const msgs = ['❤️', '💕', '想你', '爱你', '么么哒', '😘'];
    texts.push(new FloatingText(msgs[Math.floor(Math.random() * msgs.length)], e.clientX, e.clientY - 30));
});

canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const t = e.touches[0];
    for (let i = 0; i < 30; i++) {
        particles.push(new Particle(t.clientX, t.clientY, mode));
    }
});

function setMode(m) {
    mode = m;
    document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
}

// 自动模式
autoTimer = setInterval(autoBurst, 300);

// 背景星空
const bgStars = Array.from({length: 200}, () => ({
    x: Math.random() * 2000, y: Math.random() * 2000,
    r: Math.random() * 1.5 + 0.3, twinkle: Math.random() * 6.28
}));

function loop() {
    requestAnimationFrame(loop);
    ctx.fillStyle = 'rgba(10, 10, 26, 0.2)';
    ctx.fillRect(0, 0, W, H);

    bgStars.forEach(s => {
        s.twinkle += 0.02;
        ctx.fillStyle = `rgba(255,255,255,${0.2 + Math.sin(s.twinkle) * 0.2})`;
        ctx.beginPath();
        ctx.arc(s.x % W, s.y % H, s.r, 0, Math.PI * 2);
        ctx.fill();
    });

    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].draw();
        if (particles[i].life <= 0) particles.splice(i, 1);
    }
    for (let i = texts.length - 1; i >= 0; i--) {
        texts[i].update();
        texts[i].draw();
        if (texts[i].life <= 0) texts.splice(i, 1);
    }

    if (particles.length > 2000) particles.splice(0, 500);
}

loop();
</script>
</body>
</html>
